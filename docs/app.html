<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VantageX — Platform</title>
<style>
@font-face{font-family:'BaseNeue';src:url('fonts/base_neue/BaseNeueTrial-Regular.ttf') format('truetype');font-weight:400;font-display:swap}
@font-face{font-family:'BaseNeue';src:url('fonts/base_neue/BaseNeueTrial-Medium.ttf') format('truetype');font-weight:500;font-display:swap}
@font-face{font-family:'BaseNeue';src:url('fonts/base_neue/BaseNeueTrial-SemiBold.ttf') format('truetype');font-weight:600;font-display:swap}
@font-face{font-family:'BaseNeue';src:url('fonts/base_neue/BaseNeueTrial-Bold.ttf') format('truetype');font-weight:700;font-display:swap}
@font-face{font-family:'BaseNeue';src:url('fonts/base_neue/BaseNeueTrial-Black.ttf') format('truetype');font-weight:900;font-display:swap}
@font-face{font-family:'BaseNeueCond';src:url('fonts/base_neue/BaseNeueTrial-CondensedBlack.ttf') format('truetype');font-weight:900;font-display:swap}
@font-face{font-family:'BaseNeueCond';src:url('fonts/base_neue/BaseNeueTrial-CondensedBold.ttf') format('truetype');font-weight:700;font-display:swap}
@font-face{font-family:'BaseNeue';src:url('fonts/base_neue/BaseNeueTrial-Light.ttf') format('truetype');font-weight:300;font-display:swap}

:root{
  --bg:#FAFAFA;
  --surface:#FFFFFF;
  --surface-2:#F0F0F0;
  --border:#E0E0E0;
  --border-light:#D0D0D0;
  --neon:#2DBE00;
  --neon-dim:rgba(45,190,0,.10);
  --neon-dark:#1A8A00;
  --text:#111111;
  --text-dim:#555555;
  --text-muted:#999999;
  --green:#00A854;
  --red:#E53935;
  --blue:#1E88E5;
  --purple:#7B1FA2;
  --orange:#EF6C00;
  --early:#7B1FA2;
  --growth:#00A854;
  --peak:#EF8C00;
  --decline:#E53935;
  --font:'BaseNeue',system-ui,-apple-system,'Helvetica Neue',sans-serif;
  --font-cond:'BaseNeueCond','BaseNeue',system-ui,sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;background:var(--bg)}
body{
  font-family:var(--font);font-weight:400;
  background:var(--bg);color:var(--text);
  line-height:1.5;font-size:14px;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
::selection{background:var(--neon);color:#fff}

/* ═══════════════════════════════════════════
   TOP NAV
   ═══════════════════════════════════════════ */
.topnav{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(250,250,250,.94);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  height:56px;display:flex;align-items:center;
  padding:0 24px;gap:24px;
}
.topnav-logo{
  font-family:var(--font-cond);font-weight:900;
  font-size:22px;text-transform:uppercase;
  color:var(--text);letter-spacing:-.01em;
  cursor:pointer;
}
.topnav-logo span{color:var(--neon)}
.topnav-links{display:flex;gap:4px;margin-left:16px}
.topnav-link{
  padding:8px 16px;font-size:12px;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  color:var(--text-muted);cursor:pointer;
  border-radius:6px;transition:all .15s;
  border:none;background:none;
}
.topnav-link:hover{color:var(--text);background:var(--surface-2)}
.topnav-link.active{color:var(--neon-dark);background:var(--neon-dim)}
.topnav-right{margin-left:auto;display:flex;align-items:center;gap:16px}
.topnav-credits{
  display:flex;align-items:center;gap:6px;
  font-size:12px;font-weight:700;color:var(--neon-dark);
  padding:6px 14px;border:1px solid var(--neon);
  border-radius:6px;background:var(--neon-dim);
}
.topnav-credits svg{width:14px;height:14px}
.topnav-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--neon);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;cursor:pointer;
  transition:box-shadow .15s;
}
.topnav-avatar:hover{box-shadow:0 0 0 3px var(--neon-dim)}
.topnav-search{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;border:1px solid var(--border);
  border-radius:6px;background:var(--surface);
  color:var(--text-muted);font-size:12px;cursor:pointer;
  transition:border-color .15s;min-width:200px;
}
.topnav-search:hover{border-color:var(--neon)}
.topnav-search svg{width:14px;height:14px;opacity:.4}
.topnav-search span{flex:1}
.topnav-search kbd{
  font-family:var(--font);font-size:10px;font-weight:600;
  padding:2px 6px;background:var(--surface-2);border-radius:3px;
  color:var(--text-muted);
}

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
.app{
  margin-top:56px;display:flex;
  min-height:calc(100vh - 56px);
}
.main{flex:1;padding:24px;overflow-y:auto}
.sidebar{
  width:340px;min-width:340px;
  border-left:1px solid var(--border);
  background:var(--surface);
  overflow-y:auto;height:calc(100vh - 56px);
  position:sticky;top:56px;
}

/* ═══════════════════════════════════════════
   PAGE VIEWS
   ═══════════════════════════════════════════ */
.page-view{display:none}
.page-view.active{display:block}

/* ═══════════════════════════════════════════
   HOME PAGE
   ═══════════════════════════════════════════ */
.section-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px;
}
.section-label{
  font-family:var(--font-cond);font-weight:900;
  font-size:24px;text-transform:uppercase;
  color:var(--text);
}
.section-label span{color:var(--neon)}
.section-more{
  font-size:11px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--neon-dark);
  cursor:pointer;border:none;background:none;
  transition:opacity .15s;
}
.section-more:hover{opacity:.7}

/* ═══════════════════════════════════════════
   TOP SELLERS GRID
   ═══════════════════════════════════════════ */
.sellers-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:16px;
  margin-bottom:40px;
}
.seller-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:20px 16px;
  text-align:center;cursor:pointer;
  transition:all .2s;position:relative;
  overflow:hidden;
}
.seller-card:hover{
  border-color:var(--neon);
  box-shadow:0 4px 20px rgba(45,190,0,.08);
  transform:translateY(-2px);
}
.seller-rank{
  position:absolute;top:10px;left:10px;
  font-size:10px;font-weight:900;
  font-family:var(--font-cond);
  color:var(--text-muted);
}
.seller-avatar{
  width:64px;height:64px;border-radius:50%;
  margin:0 auto 12px;overflow:hidden;
  border:2px solid var(--border);
  transition:border-color .2s;
}
.seller-card:hover .seller-avatar{border-color:var(--neon)}
.seller-avatar img{width:100%;height:100%;object-fit:cover}
.seller-name{
  font-weight:700;font-size:14px;
  color:var(--text);margin-bottom:2px;
}
.seller-handle{
  font-size:11px;color:var(--text-muted);margin-bottom:10px;
}
.seller-stats{
  display:flex;justify-content:center;gap:16px;
  margin-bottom:12px;
}
.seller-stat{display:flex;flex-direction:column;gap:1px}
.seller-stat-val{
  font-size:14px;font-weight:700;color:var(--text);
}
.seller-stat-label{
  font-size:9px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-muted);
}
.seller-score{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:700;
  padding:4px 10px;border-radius:20px;
  background:var(--neon-dim);color:var(--neon-dark);
}
.seller-score svg{width:12px;height:12px}
.seller-follow{
  margin-top:10px;
  padding:6px 16px;border:1px solid var(--neon);
  border-radius:6px;background:none;
  font-family:var(--font);font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  color:var(--neon-dark);cursor:pointer;
  transition:all .15s;
}
.seller-follow:hover{background:var(--neon);color:#fff}
.seller-follow.following{
  background:var(--neon-dim);border-color:var(--neon-dim);
  color:var(--neon-dark);
}

/* ═══════════════════════════════════════════
   TRENDING ITEMS GRID
   ═══════════════════════════════════════════ */
.trends-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
  margin-bottom:24px;
}
.trend-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;overflow:hidden;cursor:pointer;
  transition:all .2s;
}
.trend-card:hover{
  border-color:var(--neon);
  box-shadow:0 4px 20px rgba(45,190,0,.08);
  transform:translateY(-2px);
}
.trend-img{
  width:100%;aspect-ratio:4/5;object-fit:cover;display:block;
}
.trend-body{padding:14px}
.trend-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:6px;
}
.trend-name{
  font-weight:700;font-size:14px;color:var(--text);
  flex:1;line-height:1.2;
}
.trend-lifecycle{
  font-size:8px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;padding:3px 7px;
  border-radius:3px;white-space:nowrap;margin-left:8px;
}
.lc-early{background:rgba(123,31,162,.08);color:var(--early)}
.lc-growth{background:rgba(0,168,84,.08);color:var(--growth)}
.lc-peak{background:rgba(239,140,0,.08);color:var(--peak)}
.lc-decline{background:rgba(229,57,53,.08);color:var(--decline)}

.trend-sub{
  font-size:11px;color:var(--text-muted);line-height:1.4;
  margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.trend-meta{
  display:flex;gap:16px;align-items:center;
  padding-top:10px;border-top:1px solid var(--surface-2);
}
.trend-meta-item{display:flex;flex-direction:column;gap:1px}
.trend-meta-label{
  font-size:8px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text-muted);
}
.trend-meta-val{font-size:13px;font-weight:700;color:var(--text)}
.trend-meta-val.up{color:var(--green)}
.trend-meta-val.down{color:var(--red)}

/* mini sparkline */
.sparkline{width:60px;height:24px}
.sparkline polyline{fill:none;stroke:var(--neon);stroke-width:1.5}

/* ═══════════════════════════════════════════
   SIDEBAR — TRADES PANE
   ═══════════════════════════════════════════ */
.sidebar-header{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:10;
}
.sidebar-title{
  font-family:var(--font-cond);font-weight:900;
  font-size:16px;text-transform:uppercase;
  color:var(--text);margin-bottom:4px;
}
.sidebar-title span{color:var(--neon)}
.sidebar-sub{font-size:11px;color:var(--text-muted)}

.sidebar-tabs{
  display:flex;gap:0;padding:0 20px;
  border-bottom:1px solid var(--border);
}
.sidebar-tab{
  flex:1;text-align:center;padding:10px 0;
  font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-muted);
  cursor:pointer;border-bottom:2px solid transparent;
  margin-bottom:-1px;transition:all .15s;
  background:none;border-left:none;border-right:none;border-top:none;
}
.sidebar-tab.active{color:var(--neon-dark);border-bottom-color:var(--neon)}

.trades-list{padding:0}
.trade-item{
  display:flex;gap:12px;align-items:center;
  padding:14px 20px;
  border-bottom:1px solid var(--surface-2);
  transition:background .1s;cursor:pointer;
}
.trade-item:hover{background:var(--surface-2)}
.trade-avatar{
  width:32px;height:32px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
}
.trade-avatar img{width:100%;height:100%;object-fit:cover}
.trade-info{flex:1;min-width:0}
.trade-action{
  font-size:12px;font-weight:600;color:var(--text);
  line-height:1.3;
}
.trade-action .trade-seller{color:var(--neon-dark);font-weight:700}
.trade-action .trade-trend{font-weight:700}
.trade-time{
  font-size:10px;color:var(--text-muted);margin-top:2px;
}
.trade-badge{
  font-size:9px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;padding:3px 8px;
  border-radius:3px;flex-shrink:0;
}
.trade-badge.scout{background:var(--neon-dim);color:var(--neon-dark)}
.trade-badge.sell{background:rgba(229,57,53,.08);color:var(--red)}
.trade-badge.cosign{background:rgba(30,136,229,.08);color:var(--blue)}
.trade-badge.list{background:rgba(239,140,0,.08);color:var(--orange)}

/* co-sign summary */
.cosign-summary{
  margin:16px 20px;padding:14px;
  background:var(--neon-dim);border-radius:8px;
}
.cosign-summary-title{
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--neon-dark);margin-bottom:8px;
}
.cosign-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:4px;
}
.cosign-row:last-child{margin-bottom:0}
.cosign-label{font-size:12px;color:var(--text-dim)}
.cosign-val{font-size:12px;font-weight:700;color:var(--text)}
.cosign-val.positive{color:var(--green)}

/* leaderboard mini */
.leaderboard-mini{padding:12px 20px}
.lb-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--surface-2);
}
.lb-item:last-child{border-bottom:none}
.lb-rank{
  font-family:var(--font-cond);font-weight:900;
  font-size:14px;color:var(--text-muted);width:20px;
}
.lb-avatar{
  width:28px;height:28px;border-radius:50%;overflow:hidden;
}
.lb-avatar img{width:100%;height:100%;object-fit:cover}
.lb-info{flex:1}
.lb-name{font-size:12px;font-weight:700;color:var(--text)}
.lb-handle{font-size:10px;color:var(--text-muted)}
.lb-score{
  font-size:12px;font-weight:700;color:var(--neon-dark);
}

/* ═══════════════════════════════════════════
   PROFILE PAGE
   ═══════════════════════════════════════════ */
.profile-hero{
  display:flex;gap:32px;align-items:flex-start;
  padding:24px;background:var(--surface);
  border:1px solid var(--border);border-radius:12px;
  margin-bottom:24px;
}
.profile-avatar-lg{
  width:100px;height:100px;border-radius:50%;
  overflow:hidden;border:3px solid var(--neon);flex-shrink:0;
}
.profile-avatar-lg img{width:100%;height:100%;object-fit:cover}
.profile-info{flex:1}
.profile-name{
  font-family:var(--font-cond);font-weight:900;
  font-size:28px;text-transform:uppercase;
  color:var(--text);margin-bottom:2px;
}
.profile-handle{font-size:13px;color:var(--text-muted);margin-bottom:8px}
.profile-bio{
  font-size:13px;color:var(--text-dim);line-height:1.5;
  margin-bottom:14px;max-width:500px;
}
.profile-stats-row{
  display:flex;gap:24px;margin-bottom:16px;
}
.profile-stat{display:flex;flex-direction:column;gap:1px}
.profile-stat-val{font-size:18px;font-weight:900;color:var(--text)}
.profile-stat-label{
  font-size:9px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text-muted);
}
.profile-actions{display:flex;gap:10px}
.btn-follow{
  padding:8px 24px;border:none;border-radius:6px;
  background:var(--neon);color:#fff;
  font-family:var(--font);font-size:11px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;transition:all .15s;
}
.btn-follow:hover{box-shadow:0 4px 16px rgba(45,190,0,.25)}
.btn-cosign{
  padding:8px 24px;border:1px solid var(--neon);
  border-radius:6px;background:var(--neon-dim);
  color:var(--neon-dark);
  font-family:var(--font);font-size:11px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;
  cursor:pointer;transition:all .15s;
}
.btn-cosign:hover{background:var(--neon);color:#fff}

.profile-vx-score{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;background:var(--neon-dim);
  border-radius:8px;margin-bottom:14px;
  width:fit-content;
}
.profile-vx-label{
  font-size:9px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--neon-dark);
}
.profile-vx-val{
  font-family:var(--font-cond);font-weight:900;
  font-size:22px;color:var(--neon-dark);
}

/* Profile sections */
.profile-section{margin-bottom:32px}
.profile-section-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.profile-section-title{
  font-family:var(--font-cond);font-weight:900;
  font-size:18px;text-transform:uppercase;color:var(--text);
}
.profile-section-title span{color:var(--neon)}

/* portfolio table */
.portfolio-table{
  width:100%;border-collapse:collapse;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;
}
.portfolio-table thead{background:var(--surface-2)}
.portfolio-table th{
  text-align:left;padding:10px 14px;
  font-size:9px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;color:var(--text-muted);
}
.portfolio-table td{
  padding:10px 14px;border-top:1px solid var(--surface-2);
  font-size:13px;color:var(--text-dim);
}
.portfolio-table td.item-name{font-weight:700;color:var(--text)}
.portfolio-table .positive{color:var(--green);font-weight:600}
.portfolio-table .negative{color:var(--red);font-weight:600}

/* accuracy metrics */
.accuracy-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:12px;
}
.accuracy-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:16px;text-align:center;
}
.accuracy-val{
  font-family:var(--font-cond);font-weight:900;
  font-size:28px;color:var(--neon-dark);
  margin-bottom:4px;
}
.accuracy-label{
  font-size:9px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text-muted);
}

/* recent moves */
.moves-list{display:flex;flex-direction:column;gap:8px}
.move-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;
  transition:border-color .15s;
}
.move-item:hover{border-color:var(--neon)}
.move-icon{
  width:36px;height:36px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.move-icon.scout-icon{background:var(--neon-dim);color:var(--neon-dark)}
.move-icon.sell-icon{background:rgba(229,57,53,.08);color:var(--red)}
.move-icon.list-icon{background:rgba(239,140,0,.08);color:var(--orange)}
.move-info{flex:1}
.move-title{font-size:13px;font-weight:600;color:var(--text)}
.move-desc{font-size:11px;color:var(--text-muted);margin-top:1px}
.move-time{
  font-size:10px;color:var(--text-muted);flex-shrink:0;
}

/* ═══════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════ */
@media(max-width:1200px){
  .sellers-grid{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:1024px){
  .sidebar{width:300px;min-width:300px}
  .sellers-grid{grid-template-columns:repeat(2,1fr)}
  .trends-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .sidebar{display:none}
  .sellers-grid{grid-template-columns:repeat(2,1fr)}
  .trends-grid{grid-template-columns:1fr 1fr}
  .accuracy-grid{grid-template-columns:repeat(2,1fr)}
  .topnav-search{display:none}
}

/* ═══════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both}
.fade-in-1{animation-delay:.05s}
.fade-in-2{animation-delay:.1s}
.fade-in-3{animation-delay:.15s}
.fade-in-4{animation-delay:.2s}

/* Live dot */
.live-dot{
  width:6px;height:6px;border-radius:50%;background:var(--neon);
  animation:pulse 2s ease-in-out infinite;
}

function makeSparkline(chart){
  const w=60,h=24;
  const max=Math.max(...chart),min=Math.min(...chart);
  const pts=chart.map((v,i)=>{
    const x=(i/(chart.length-1))*w;
    const y=h-((v-min)/(max-min))*h;
    return `${x},${y}`;
  }).join(' ');
  return `<svg class="sparkline" viewBox="0 0 ${w} ${h}"><polyline points="${pts}"/></svg>`;
}

    const deltaClass = t.delta >= 0 ? 'up' : 'down';
    return `
    <div class="trend-card fade-in fade-in-${i%4+1}">
      <img class="trend-img" src="${t.img}" alt="${t.name}" loading="lazy">
      <div class="trend-body">

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function showPage(page){
  document.querySelectorAll('.page-view').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.topnav-link').forEach(l=>l.classList.remove('active'));
  const link = document.querySelector(`.topnav-link[data-page="${page}"]`);
  if(link) link.classList.add('active');
  window.scrollTo(0,0);
}

function switchSidebarTab(tab, btn){
  document.querySelectorAll('.sidebar-panel').forEach(p=>p.style.display='none');
  document.getElementById('sidebar-'+tab).style.display='block';
  document.querySelectorAll('.sidebar-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
}

function toggleFollow(btn){
  if(btn.classList.contains('following')){
    btn.classList.remove('following');
    btn.textContent='Follow';
  } else {
    btn.classList.add('following');
    btn.textContent='Following';
  }
}
