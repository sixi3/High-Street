<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VantageX Pages</title>
  <style>
    :root{
      --bg:#0a0a0a;
      --fg:#d7ff4a;
      --muted:#9ca3af;
      --card:#111;
      --border:#1f2937;
      --link:#d7ff4a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:radial-gradient(circle at top,#1a1a1a 0%,var(--bg) 50%);
      color:#fff;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    }
    .wrap{
      width:min(700px,92vw);
      border:1px solid var(--border);
      background:var(--card);
      padding:28px;
      border-radius:8px;
    }
    h1{
      margin:0 0 8px;
      color:var(--fg);
      letter-spacing:.04em;
      font-size:clamp(24px,4vw,38px);
    }
    p{margin:0 0 20px;color:var(--muted)}
    .links{display:grid;gap:10px}
    a{
      display:block;
      padding:12px 14px;
      border:1px solid #243041;
      border-radius:6px;
      text-decoration:none;
      color:var(--link);
      background:#0f172a;
      font-weight:600;
    }
    a:hover{border-color:#3b4e69}
  </style>
</head>
<body>
  <main class="wrap">
    <h1>VantageX</h1>
    <p>Published pages for PRD and prototype.</p>
    <div class="links">
      <a href="./prd.html">Open PRD</a>
      <a href="./app.html">Open Prototype</a>
    </div>
  </main>
</body>
</html>
